<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pal Firing Squad</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#6d28d9,#1e1b4b);
  color:white;
}

.container {
  max-width:900px;
  margin:auto;
  padding:30px 20px;
}

.card {
  background:white;
  color:#111;
  border-radius:20px;
  padding:25px;
  margin:20px 0;
  box-shadow:0 20px 50px rgba(0,0,0,.3);
}

h1 {
  font-size:40px;
  margin-bottom:10px;
}

.subtitle {
  opacity:.8;
  margin-bottom:20px;
}

textarea {
  width:100%;
  min-height:80px;
  border-radius:10px;
  border:1px solid #ddd;
  padding:10px;
}

button {
  background:#6d28d9;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
  margin-top:15px;
  font-weight:bold;
}

button.secondary {
  background:#111;
}

.question {
  margin-top:15px;
}

.score {
  font-size:70px;
  font-weight:bold;
  color:#6d28d9;
}

.result {
  background:#f1f5f9;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>Pal Firing Squad</h1>
<div class="subtitle">Brutally honest compatibility breakdown</div>

<div class="card">
<button onclick="setupOwner()">Set Your Answers (One-Time Setup)</button>
<button class="secondary" onclick="startFriend()">Start Compatibility Test</button>
</div>

<div id="app"></div>

</div>

<script>

const QUESTIONS = [
"What are your hobbies and interests?",
"Are you clean or messy?",
"What are your long-term goals?",
"What are your pet peeves?",
"What do you value most in a friendship?",
"What are your beliefs about honesty?",
"Do you believe in God?",
"Do you want children?",
"What would you do if you found a wallet full of money?",
"What is your ideal way to spend free time?"
];

// ---------- OWNER SETUP ----------
function setupOwner(){
  document.getElementById("app").innerHTML = `
  <div class="card">
    <h2>Your Profile (saved once)</h2>
    <div id="ownerQuestions"></div>
    <button onclick="saveOwner()">Save My Answers</button>
  </div>`;
  
  render("ownerQuestions","o");
}

function saveOwner(){
  const answers = QUESTIONS.map((_,i)=>document.getElementById("o"+i).value);
  localStorage.setItem("owner", JSON.stringify(answers));
  alert("Saved. You never have to do this again.");
}

// ---------- FRIEND FLOW ----------
function startFriend(){
  document.getElementById("app").innerHTML = `
  <div class="card">
    <h2>Answer Honestly</h2>
    <div id="friendQuestions"></div>
    <button onclick="submitFriend()">Get Results</button>
  </div>`;
  
  render("friendQuestions","f");
}

// ---------- RENDER ----------
function render(id,prefix){
  const box = document.getElementById(id);
  box.innerHTML = QUESTIONS.map((q,i)=>`
    <div class="question">
      <b>${i+1}. ${q}</b>
      <textarea id="${prefix}${i}"></textarea>

```
</div>`).join("");
```

}

// ---------- SCORING ----------
function submitFriend(){
const owner = JSON.parse(localStorage.getItem("owner"));

if(!owner){
alert("Owner has not set answers yet.");
return;
}

const friend = QUESTIONS.map((_,i)=>document.getElementById("f"+i).value);

let score = 0;

friend.forEach((f,i)=>{
if(!f || !owner[i]) return;

```
const fWords = f.toLowerCase().split(" ");
const oWords = owner[i].toLowerCase().split(" ");

const matches = fWords.filter(w=>oWords.includes(w)).length;

score += matches;
```

});

let percent = Math.min(100, score);

let verdict =
percent > 75 ? "🔥 Strong Alignment" :
percent > 55 ? "👍 Decent Compatibility" :
"⚠️ Major Differences";

document.getElementById("app").innerHTML = `

  <div class="card">
    <h2>Compatibility Result</h2>
    <div class="score">${percent}%</div>
    <div class="result">${verdict}</div>
  </div>`;
}

</script>

</body>
</html>
